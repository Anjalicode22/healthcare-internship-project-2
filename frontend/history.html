<!DOCTYPE html>
<html>
<head>
<title>Patient History</title>

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#f4f7fc;
}

.sidebar{
width:200px;
background:#1565c0;
color:white;
padding-top:30px;
display:flex;
flex-direction:column;
}

.sidebar h3{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:12px 20px;
}

.sidebar a:hover{
background:#0d47a1;
}

.active{
background:#0d47a1;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

h2{
color:#1565c0;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

th, td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#1565c0;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.btn-delete{
padding:5px 10px;
background:#ff4d4d;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.btn-delete:hover{
background:#cc0000;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>🏥 Hospital</h3>
<a href="/patient">Patient</a>
<a href="/history" class="active">History</a>
<a href="/admin">Admin</a>
<a href="/">Logout</a>
</div>

<div class="main">

<h2>📋 Patient History</h2>

<table id="historyTable">
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>BMI</th>
<th>Disease</th>
<th>Risk %</th>
<th>Action</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

</div>

<script>

/* Load History Data */
let data = JSON.parse(localStorage.getItem("patientHistory")) || [];

let tableBody = document.querySelector("#historyTable tbody");

/* Render Table */
function loadTable(){
tableBody.innerHTML="";

data.forEach((item,index)=>{

let row = tableBody.insertRow();

row.insertCell(0).innerText = item.date || "-";
row.insertCell(1).innerText = item.name || "-";  // ✅ NAME FIXED
row.insertCell(2).innerText = item.age || "-";
row.insertCell(3).innerText = item.gender || "-";
row.insertCell(4).innerText = item.bmi || "-";
row.insertCell(5).innerText = item.disease || "-";
row.insertCell(6).innerText = item.riskScore || item.risk || "-";

let actionCell = row.insertCell(7);

let deleteBtn = document.createElement("button");
deleteBtn.innerText="Delete";
deleteBtn.className="btn-delete";

deleteBtn.onclick = function(){
deleteRecord(index);
};

actionCell.appendChild(deleteBtn);

});
}

/* Delete Specific Record */
function deleteRecord(index){

if(confirm("Are you sure you want to delete this record?")){

data.splice(index,1);

localStorage.setItem("patientHistory", JSON.stringify(data));

loadTable(); // Refresh table

}
}

/* Initial Load */
loadTable();

</script>

</body>
</html>
