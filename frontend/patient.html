<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
<h2>🏥 HealthCare</h2>
<a href="patient.html">🩺 Add Patient</a>
<a href="history.html">📂 History</a>
<a href="admin.html">📊 Admin Dashboard</a>
<a href="login.html" onclick="logout()">🚪 Logout</a>
</div>

<div class="main-content">
<div class="container">
<h2>Add Patient Details</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="hr" placeholder="Heart Rate">
<input id="glucose" placeholder="Glucose Level">

<button onclick="saveData()">Predict & Save</button>

</div>
</div>

<script>
function logout(){
    localStorage.removeItem("currentUser");
}

async function saveData(){

    // 🔹 Get values properly
    let nameValue = document.getElementById("name").value.trim();
    let ageValue = document.getElementById("age").value;
    let genderValue = document.getElementById("gender").value;
    let heightValue = document.getElementById("height").value;
    let weightValue = document.getElementById("weight").value;
    let hrValue = document.getElementById("hr").value;
    let glucoseValue = document.getElementById("glucose").value;

    if(nameValue === ""){
        alert("Please enter patient name");
        return;
    }

    let patientData = {
        name: nameValue,
        age: ageValue,
        height: heightValue,
        weight: weightValue,
        hr: hrValue,
        glucose: glucoseValue
    };

    let response = await fetch("http://127.0.0.1:5000/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(patientData)
    });

    let result = await response.json();

    let record = {
        date: result.date,
        name: nameValue,
        age: ageValue,
        gender: genderValue,
        bmi: result.bmi,
        disease: result.disease,
        riskLevel: result.risk_level,
        riskScore: result.risk_score
    };

    let data = JSON.parse(localStorage.getItem("patientHistory")) || [];
    data.push(record);
    localStorage.setItem("patientHistory", JSON.stringify(data));

    alert("Disease: " + result.disease + "\nRisk Level: " + result.risk_level);
}
</script>

</body>
</html>
